services:
  # El servidor de Consul que gestionará todo
  consul-server:
    image: hashicorp/consul:1.15
    container_name: consul-server
    restart: always
    ports:
      - "8500:8500" # Interfaz web para ver servicios activos
      - "8600:8600/udp"
    command: "agent -server -bootstrap-expect=1 -ui -bind=0.0.0.0 -client=0.0.0.0"

  # Aquí podrías agregar más adelante tu API Gateway y Microservicios